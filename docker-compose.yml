services:
  caddy:
    image: caddy:2-alpine
    # --watch tells Caddy to reload automatically when Caddyfile changes on disk.
    # The reconfigure service updates Caddyfile when DOMAIN changes in .env.
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --watch
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

  reconfigure:
    image: alpine:3.19
    volumes:
      - ./.env:/config/.env:ro
      - ./Caddyfile:/config/Caddyfile
      - ./reconfigure.sh:/reconfigure.sh:ro
    command: sh /reconfigure.sh
    restart: unless-stopped

  backend:
    image: ghcr.io/lloyd-theophilus/kubewatch-backend:latest
    environment:
      PORT: "8080"
      DB_PATH: "/data/kubewatch.db"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRY: "${JWT_EXPIRY:-24h}"
      KUBEWATCH_API_KEY: "${KUBEWATCH_API_KEY}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@kubewatch.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin1234}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      ALERT_EMAIL_TO: "${ALERT_EMAIL_TO:-}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      UPDATE_CHECK_URL: "${UPDATE_CHECK_URL:-}"
    volumes:
      - kubewatch-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: ghcr.io/lloyd-theophilus/kubewatch-frontend:latest
    environment:
      API_BASE: "http://backend:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  kubewatch-data:
  caddy-data:
  caddy-config:
