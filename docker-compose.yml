services:
  caddy:
    security_opt:
      - "no-new-privileges:true"
    image: public.ecr.aws/docker/library/caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped
    depends_on:
      - gateway

  gateway:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-gateway:latest
    environment:
      GATEWAY_PORT: "8000"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      AUTH_SERVICE_URL: http://auth:8001
      INGESTION_SERVICE_URL: http://ingestion:8002
      QUERY_SERVICE_URL: http://query:8003
      LIVE_DATA_SERVICE_URL: http://live-data:8009
      CLUSTERS_SERVICE_URL: http://clusters:8008
      INCIDENTS_SERVICE_URL: http://incidents:8013
      CLOUD_SERVICE_URL: http://cloud:8010
      INTEGRATIONS_SERVICE_URL: http://integrations:8011
      JWT_SECRET: ${JWT_SECRET}
      KUBEWATCH_LICENSE_KEY: ${KUBEWATCH_LICENSE_KEY:-}
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-}
      # Public IP of this host, used by the Caddy on-demand-TLS gate
      # (/api/v1/tls-check) so a domain pointed here auto-provisions HTTPS.
      SERVER_PUBLIC_IP: ${SERVER_PUBLIC_IP:-}
    # Persist instance ID + activated license key/cache so the license survives
    # restarts (otherwise it reverts to trial and churns trial instance IDs).
    volumes:
      - gateway_data:/data
    restart: unless-stopped
    depends_on:
      - auth
      - ingestion
      - query

  auth:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-auth:latest
    environment:
      AUTH_PORT: "8001"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      KUBEWATCH_LICENSE_KEY: ${KUBEWATCH_LICENSE_KEY:-}
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: "24h"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # External origin used to build SAML SSO SP URLs (ACS / EntityID).
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DOMAIN: ${DOMAIN:-}
      NATS_URL: nats://nats:4222
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy

  ingestion:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-ingestion:latest
    environment:
      INGESTION_PORT: "8002"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      NATS_URL: nats://nats:4222
      VICTORIAMETRICS_INSERT_URL: http://victoriametrics:8428
      VICTORIALOGS_URL: http://victorialogs:9428
      AUTH_SERVICE_URL: http://auth:8001
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  query:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-query:latest
    environment:
      QUERY_PORT: "8003"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      APP_VERSION: ${APP_VERSION:-dev}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      VICTORIAMETRICS_SELECT_URL: http://victoriametrics:8428
      VICTORIAMETRICS_INSERT_URL: http://victoriametrics:8428
      VICTORIALOGS_URL: http://victorialogs:9428
      NATS_URL: nats://nats:4222
      NOTIFICATION_SERVICE_URL: http://notification:8007
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-https://licenses.kubewatchlabs.com}
      # In-app "Update Now" runs `docker compose pull && up -d` from a detached
      # updater container. COMPOSE_DIR is the host path of this project so the
      # updater can bind-mount it; ${PWD} resolves to where compose was invoked.
      COMPOSE_DIR: ${PWD}
      COMPOSE_FILE: ${COMPOSE_FILE:-docker-compose.yml}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-}
    # Docker socket: System Health reads container state; "Update Now" launches
    # the updater container through it.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  alert-engine:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-alert-engine:latest
    environment:
      ALERT_ENGINE_PORT: "8005"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      VICTORIAMETRICS_SELECT_URL: http://victoriametrics:8428
      NATS_URL: nats://nats:4222
      EVAL_INTERVAL: "30s"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  scaling-engine:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-scaling-engine:latest
    environment:
      SCALING_ENGINE_PORT: "8012"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      VICTORIAMETRICS_SELECT_URL: http://victoriametrics:8428
      NATS_URL: nats://nats:4222
      SCALE_INTERVAL: "30s"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  notification:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-notification:latest
    environment:
      NOTIFICATION_PORT: "8007"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      NATS_URL: nats://nats:4222
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  live-data:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-live-data:latest
    environment:
      PORT: "8009"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      NATS_URL: nats://nats:4222
      AUTH_SERVICE_URL: http://auth:8001
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  clusters:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-clusters:latest
    environment:
      PORT: "8008"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      VICTORIAMETRICS_INSERT_URL: http://victoriametrics:8428
    volumes:
      - ~/.kube:/root/.kube:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  incidents:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-incidents:latest
    environment:
      PORT: "8013"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
      NATS_URL: nats://nats:4222
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  cloud:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-cloud:latest
    environment:
      PORT: "8010"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  integrations:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-integrations:latest
    environment:
      PORT: "8011"
      KUBEWATCH_MODE: ${KUBEWATCH_MODE:-selfhosted}
      DATABASE_URL: postgres://kubewatch:${DB_PASSWORD}@postgres:5432/kubewatch?sslmode=disable
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    security_opt:
      - "no-new-privileges:true"
    image: ghcr.io/lloyd-theophilus/kubewatch-frontend:latest
    environment:
      API_BASE: http://gateway:8000
      NEXT_PUBLIC_MODE: selfhosted
      NEXT_PUBLIC_API_URL: http://${DOMAIN:-localhost}:8000
    restart: unless-stopped
    depends_on:
      - gateway

  postgres:
    security_opt:
      - "no-new-privileges:true"
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_DB: kubewatch
      POSTGRES_USER: kubewatch
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubewatch"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot schema migrator. Applies infra/migrations/*.sql (staged into
  # ./migrations by the deploy job) on every `up`.
  #
  # The migration files are in goose format (-- +goose Up / -- +goose Down).
  # psql does not understand those directives, so we strip everything from
  # "-- +goose Down" onward and apply only the Up section — otherwise psql
  # would run each Down block too and drop the tables it just created.
  # Up sections use CREATE TABLE/COLUMN IF NOT EXISTS and ON CONFLICT, so
  # re-running is safe. Services reading core tables wait for this to finish.
  migrate:
    security_opt:
      - "no-new-privileges:true"
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    entrypoint:
      - sh
      - -c
      - |
        echo "Applying database migrations…"
        # A glob that matches nothing expands to its own literal pattern
        # string in sh (no nullglob here), so an empty/missing /migrations
        # directory would otherwise silently "succeed" with zero migrations
        # ever applied — sed would fail to open a file literally named
        # "/migrations/*.sql", but the `|| true` below swallows that,
        # masking what is actually a critical failure as "Migrations
        # complete.". Fail loudly instead: this always means the updater's
        # migrations refresh didn't run or didn't land where expected.
        set -- /migrations/*.sql
        if [ ! -e "$$1" ]; then
          echo "ERROR: no .sql files found in /migrations — refusing to report success. Check that ./migrations on the host is actually populated (see the updater container's own logs: docker logs kubewatch-updater)." >&2
          exit 1
        fi
        for f in /migrations/*.sql; do
          echo ">> applying $$f (Up only)"
          sed '/-- +goose Down/,$$d' "$$f" | psql -h postgres -U kubewatch -d kubewatch -v ON_ERROR_STOP=0 || true
        done
        echo "Migrations complete."
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Disaster recovery: scheduled Postgres backups pushed to one or more
  # configured destinations (BACKUP_DESTINATIONS, comma-separated: s3, sftp,
  # webhook, azure — an instance can push to just one, or several at once
  # for redundancy), each immediately followed by an automated restore test
  # (restores into a scratch database on this same Postgres server, never
  # the real "kubewatch" database, verifies a basic row count, then drops
  # it). Self-hosted only for now; SaaS's own platform-wide backups are an
  # operator-console concern, not something exposed per-org. If
  # BACKUP_DESTINATIONS isn't set, this just idles — no backups run, and
  # nothing else in the stack is affected.
  #
  # The manual "run backup now" trigger in services/query's Docker-Engine-API
  # code launches a one-off container running the same logic as below with
  # triggered_by=manual; keep the two in sync if this changes.
  backup:
    security_opt:
      - "no-new-privileges:true"
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: kubewatch
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: kubewatch
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      # Comma-separated subset of: s3, sftp, webhook, azure. Empty disables
      # the feature entirely. Each kind's own env vars below only matter if
      # that kind is listed here.
      BACKUP_DESTINATIONS: ${BACKUP_DESTINATIONS:-}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_S3_USE_SSL: ${BACKUP_S3_USE_SSL:-true}
      # SFTP: a dedicated, backup-only-scoped SSH key is strongly recommended
      # over reusing a general admin key. Host key verification is
      # trust-on-first-connect (accept-new), not pre-pinned — acceptable for
      # a destination you configured yourself, not a substitute for network
      # controls if that matters for your threat model.
      BACKUP_SFTP_HOST: ${BACKUP_SFTP_HOST:-}
      BACKUP_SFTP_PORT: ${BACKUP_SFTP_PORT:-22}
      BACKUP_SFTP_USER: ${BACKUP_SFTP_USER:-}
      BACKUP_SFTP_PATH: ${BACKUP_SFTP_PATH:-}
      BACKUP_SFTP_PRIVATE_KEY: ${BACKUP_SFTP_PRIVATE_KEY:-} # base64-encoded PEM private key
      # Generic webhook: the dump is POSTed as the raw request body.
      BACKUP_WEBHOOK_URL: ${BACKUP_WEBHOOK_URL:-}
      BACKUP_WEBHOOK_AUTH_HEADER: ${BACKUP_WEBHOOK_AUTH_HEADER:-} # e.g. "Bearer <token>", sent as Authorization
      # Azure Blob: a container-level SAS URL with write permission
      # (generate via the Azure Portal or `az storage container generate-sas`),
      # e.g. https://acct.blob.core.windows.net/container?sv=...&sig=... —
      # avoids implementing Azure's Shared-Key HMAC signing from scratch.
      BACKUP_AZURE_CONTAINER_SAS_URL: ${BACKUP_AZURE_CONTAINER_SAS_URL:-}
    entrypoint:
      - sh
      - -c
      - |
        if [ -z "$$BACKUP_DESTINATIONS" ]; then
          echo "BACKUP_DESTINATIONS not set -- disaster recovery backups are disabled. Set this (and the matching destination env vars) to enable scheduled backups and restore tests."
          while true; do sleep 3600; done
        fi

        has_destination() {
          case ",$$BACKUP_DESTINATIONS," in
            *",$$1,"*) return 0 ;;
            *) return 1 ;;
          esac
        }

        if has_destination s3; then
          echo "==> installing mc (MinIO client, for the s3 destination)"
          wget -qO /usr/local/bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /usr/local/bin/mc
          SCHEME=https
          if [ "$$BACKUP_S3_USE_SSL" = "false" ]; then SCHEME=http; fi
          mc alias set dr "$$SCHEME://$$BACKUP_S3_ENDPOINT" "$$BACKUP_S3_ACCESS_KEY" "$$BACKUP_S3_SECRET_KEY" --api S3v4
        fi
        if has_destination sftp; then
          echo "==> installing openssh-client (for the sftp destination)"
          apk add --no-cache openssh-client >/dev/null
        fi

        record_destination() {
          # $$1=row id  $$2=backup id  $$3=kind  $$4=status  $$5=location  $$6=error
          psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -c \
            "INSERT INTO dr_backup_destinations (id, backup_id, kind, status, location, error, completed_at) VALUES ('$$1', '$$2', '$$3', '$$4', '$$5', '$$6', NOW())" >/dev/null
        }

        push_s3() { mc cp "$$1" "dr/$$BACKUP_S3_BUCKET/$$2" >/dev/null 2>&1; }

        push_sftp() {
          key_file="/tmp/sftp_key_$$$$"
          echo "$$BACKUP_SFTP_PRIVATE_KEY" | base64 -d > "$$key_file" 2>/dev/null
          chmod 600 "$$key_file"
          # A single "put" piped in via stdin, rather than a heredoc — avoids
          # any risk of the heredoc terminator not matching once this script
          # is indented inside a YAML block scalar.
          echo "put $$1 $$BACKUP_SFTP_PATH/$$2" | sftp -i "$$key_file" -P "$$BACKUP_SFTP_PORT" \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$$BACKUP_SFTP_USER@$$BACKUP_SFTP_HOST" >/dev/null 2>&1
          rc=$$?
          rm -f "$$key_file"
          return $$rc
        }

        push_webhook() {
          # Branches instead of building an optional flag into a variable and
          # leaving it unquoted — an unquoted "--header=...: value" variable
          # would word-split on its embedded space/colon and mangle the flag.
          if [ -n "$$BACKUP_WEBHOOK_AUTH_HEADER" ]; then
            wget -q --method=POST --body-file="$$1" \
              --header="Authorization: $$BACKUP_WEBHOOK_AUTH_HEADER" \
              --header="Content-Type: application/octet-stream" --header="X-Backup-Filename: $$2" \
              -O /dev/null "$$BACKUP_WEBHOOK_URL" >/dev/null 2>&1
          else
            wget -q --method=POST --body-file="$$1" \
              --header="Content-Type: application/octet-stream" --header="X-Backup-Filename: $$2" \
              -O /dev/null "$$BACKUP_WEBHOOK_URL" >/dev/null 2>&1
          fi
        }

        push_azure() {
          base="$${BACKUP_AZURE_CONTAINER_SAS_URL%%\?*}"
          query="$${BACKUP_AZURE_CONTAINER_SAS_URL#*\?}"
          wget -q --method=PUT --body-file="$$1" \
            --header="x-ms-blob-type: BlockBlob" --header="Content-Type: application/octet-stream" \
            -O /dev/null "$$base/$$2?$$query" >/dev/null 2>&1
        }

        # Pushes to every configured destination, recording one
        # dr_backup_destinations row per attempt. Returns success (0) if at
        # least one destination succeeded.
        push_all_destinations() {
          backup_id="$$1"
          dump_file="$$2"
          any_ok=1
          saved_ifs="$$IFS"
          IFS=','
          set -- $$BACKUP_DESTINATIONS
          IFS="$$saved_ifs"
          for dest in "$$@"; do
            dest=$$(echo "$$dest" | tr -d ' ')
            [ -z "$$dest" ] && continue
            row_id="drd_$$(date +%s)_$$$$_$$dest"
            name="$${backup_id}.dump"
            case "$$dest" in
              s3)
                key="backups/$$name"
                if push_s3 "$$dump_file" "$$key"; then
                  record_destination "$$row_id" "$$backup_id" "s3" "success" "$$key" ""; any_ok=0
                else
                  record_destination "$$row_id" "$$backup_id" "s3" "failed" "" "upload failed"
                fi ;;
              sftp)
                if push_sftp "$$dump_file" "$$name"; then
                  record_destination "$$row_id" "$$backup_id" "sftp" "success" "$$BACKUP_SFTP_PATH/$$name" ""; any_ok=0
                else
                  record_destination "$$row_id" "$$backup_id" "sftp" "failed" "" "sftp upload failed"
                fi ;;
              webhook)
                if push_webhook "$$dump_file" "$$name"; then
                  record_destination "$$row_id" "$$backup_id" "webhook" "success" "$$BACKUP_WEBHOOK_URL" ""; any_ok=0
                else
                  record_destination "$$row_id" "$$backup_id" "webhook" "failed" "" "webhook post failed"
                fi ;;
              azure)
                if push_azure "$$dump_file" "$$name"; then
                  record_destination "$$row_id" "$$backup_id" "azure" "success" "$$name" ""; any_ok=0
                else
                  record_destination "$$row_id" "$$backup_id" "azure" "failed" "" "azure upload failed"
                fi ;;
              *)
                echo "unknown BACKUP_DESTINATIONS entry: $$dest" >&2 ;;
            esac
          done
          return $$any_ok
        }

        run_restore_test() {
          backup_id="$$1"
          dump_file="$$2"
          test_id="rt_$$(date +%s)_$$$$"
          scratch_db="dr_test_$$(date +%s)"
          psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -v ON_ERROR_STOP=1 -c \
            "INSERT INTO dr_restore_tests (id, backup_id, status) VALUES ('$$test_id', '$$backup_id', 'running')"

          if psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -v ON_ERROR_STOP=1 -c "CREATE DATABASE $$scratch_db" \
             && pg_restore -h "$$PGHOST" -U "$$PGUSER" -d "$$scratch_db" --format=custom "$$dump_file"; then
            org_count=$$(psql -h "$$PGHOST" -U "$$PGUSER" -d "$$scratch_db" -t -A -c "SELECT COUNT(*) FROM organizations" 2>/dev/null)
            if [ -n "$$org_count" ]; then
              psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -c \
                "UPDATE dr_restore_tests SET status='passed', completed_at=NOW(), verified_org_count=$$org_count WHERE id='$$test_id'"
            else
              psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -c \
                "UPDATE dr_restore_tests SET status='failed', completed_at=NOW(), error='verification query failed' WHERE id='$$test_id'"
            fi
          else
            psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -c \
              "UPDATE dr_restore_tests SET status='failed', completed_at=NOW(), error='restore failed' WHERE id='$$test_id'"
          fi
          # Always drop the scratch database, even if restore/verify failed partway.
          psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -c "DROP DATABASE IF EXISTS $$scratch_db" >/dev/null 2>&1 || true
        }

        run_backup() {
          triggered_by="$${1:-scheduled}"
          id="bkp_$$(date +%s)_$$$$"
          psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -v ON_ERROR_STOP=1 -c \
            "INSERT INTO dr_backups (id, status, triggered_by) VALUES ('$$id', 'running', '$$triggered_by')"

          dump_file="/tmp/$${id}.dump"
          if pg_dump -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" --format=custom --compress=9 -f "$$dump_file"; then
            size=$$(stat -c %s "$$dump_file")
            if push_all_destinations "$$id" "$$dump_file"; then
              psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -c \
                "UPDATE dr_backups SET status='success', completed_at=NOW(), size_bytes=$$size WHERE id='$$id'"
              run_restore_test "$$id" "$$dump_file"
            else
              psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -c \
                "UPDATE dr_backups SET status='failed', completed_at=NOW(), size_bytes=$$size, error='all configured destinations failed' WHERE id='$$id'"
            fi
          else
            psql -h "$$PGHOST" -U "$$PGUSER" -d "$$PGDATABASE" -c \
              "UPDATE dr_backups SET status='failed', completed_at=NOW(), error='pg_dump failed' WHERE id='$$id'"
          fi
          rm -f "$$dump_file"
        }

        echo "==> disaster-recovery backup loop starting (interval=$${BACKUP_INTERVAL_SECONDS}s, destinations=$$BACKUP_DESTINATIONS)"
        while true; do
          run_backup scheduled
          sleep "$$BACKUP_INTERVAL_SECONDS"
        done
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  victoriametrics:
    security_opt:
      - "no-new-privileges:true"
    image: victoriametrics/victoria-metrics:latest
    command:
      - -retentionPeriod=365d
      - -storageDataPath=/victoria-metrics-data
    volumes:
      - vm_data:/victoria-metrics-data
    restart: unless-stopped

  # Log-oriented sibling of victoriametrics above: holds AI agent spans and
  # continuously-collected container/pod logs (see services/ingestion's
  # startBulkLogsWriter and startTSDBWriter). Present in the local dev
  # compose since these features were built, but missing here until now —
  # ingestion/query fall back to this exact hostname when VICTORIALOGS_URL
  # isn't set, so without this service those features 500 on every request.
  victorialogs:
    security_opt:
      - "no-new-privileges:true"
    image: victoriametrics/victoria-logs:latest
    command:
      - -retentionPeriod=30d
      - -storageDataPath=/victoria-logs-data
    volumes:
      - vl_data:/victoria-logs-data
    restart: unless-stopped

  nats:
    security_opt:
      - "no-new-privileges:true"
    image: public.ecr.aws/docker/library/nats:2-alpine
    # -m enables the HTTP monitoring port used by the healthcheck below —
    # without a healthcheck, `depends_on: condition: service_started` only
    # waits for the process to start, not for NATS to actually accept
    # connections. On a fresh `up -d`, dependents can start (and give up
    # connecting) before NATS is ready, silently breaking the metrics
    # pipeline until manually restarted — see live-data's NATS connection
    # comment for how it degrades instead of crashing.
    command: ["-js", "-sd", "/data", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - nats_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  vm_data:
  vl_data:
  nats_data:
  caddy_data:
  gateway_data:
